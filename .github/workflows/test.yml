name: Run Tests
on:
  push:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://first_principles:first_principles_password@localhost:5432/first_principles
      VIRTUAL_ENV: ${{ github.workspace }}/api/.venv
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: first_principles
          POSTGRES_PASSWORD: first_principles_password
          POSTGRES_DB: first_principles
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd api
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Create virtual environment
        run: |
          cd api
          python -m venv .venv
          echo "$GITHUB_WORKSPACE/api/.venv/bin" >> $GITHUB_PATH

      - name: Build Rust extension
        run: |
          cd math_and_physics
          maturin develop

      - name: Verify math_and_physics installed
        run: |
          source api/.venv/bin/activate
          python -c "import math_and_physics; print('success')"

      - name: Run migration
        run: |
          cd api
          alembic upgrade head

      - name: Run Python tests
        run: |
          cd api
          pytest

      - name: Run Rust tests
        run: |
          cd math_and_physics
          cargo test